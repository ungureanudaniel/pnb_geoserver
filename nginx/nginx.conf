worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/geo+json;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name map.bucegipark.ro;

        # Redirect all HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name map.bucegipark.ro;

        # Existing SSL certificate for map.bucegipark.ro
        # Mount the cert files into the container via docker-compose.yml volumes
        ssl_certificate     /etc/nginx/ssl/map.bucegipark.ro.crt;
        ssl_certificate_key /etc/nginx/ssl/map.bucegipark.ro.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Leaflet map ──────────────────────────────────────────────────
        # Serves map at https://map.bucegipark.ro/
        location / {
            root /var/www/html/park;
            index index.html;
            try_files $uri $uri/ =404;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|gif|ico|geojson)$ {
                expires 1d;
                add_header Cache-Control "public";
            }
        }

        # ── GeoServer proxy ──────────────────────────────────────────────
        # 'geoserver' resolves to the GeoServer container via Docker network
        location /geoserver {
            proxy_pass http://geoserver:8090/geoserver;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for large WFS responses
            proxy_read_timeout    120s;
            proxy_connect_timeout 30s;
            proxy_buffer_size     16k;
            proxy_buffers         8 16k;
            proxy_busy_buffers_size 32k;

            # CORS headers for Leaflet requests
            add_header Access-Control-Allow-Origin  $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }
    }
}
